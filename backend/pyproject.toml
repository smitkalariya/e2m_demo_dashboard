[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.coverage.run]
# SQLAlchemy's async engine executes queries on a separate greenlet (via
# greenlet_spawn). Without greenlet-aware tracing, coverage.py loses the trace
# function across that switch and silently under-reports every line that
# follows an `await session.execute(...)` call in the same coroutine — i.e.
# most of the services/repositories layer. This was the actual cause of the
# previously-reported low coverage numbers for those files, not missing tests.
concurrency = ["greenlet", "thread"]
